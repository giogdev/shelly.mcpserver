name: Pipeline

on:
  push:
    branches: [ "master", "staging" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "master", "staging"]

# Least-privilege permissions at workflow level; jobs override as needed
permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME_MCP: giogdev/shelly-cloud-mcp-server
  IMAGE_NAME_API: giogdev/shelly-api-gateway
  DOTNET_VERSION:  10.0.x

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Test
        run: dotnet test --no-build --verbosity normal

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF results to GitHub Security tab
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # --- 1. NuGet dependency audit ---
      - name: Restore dependencies
        run: dotnet restore

      - name: Audit NuGet packages for known vulnerabilities
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee nuget-audit.txt
        # Fail the job if any vulnerability is found
      - name: Fail if vulnerabilities found
        run: |
          if grep -q "has the following vulnerable packages" nuget-audit.txt; then
            echo "::error::Vulnerable NuGet packages detected. See nuget-audit.txt for details."
            exit 1
          fi

      # --- 2. CodeQL SAST ---
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          # Use security-and-quality for broader rule coverage
          queries: security-and-quality

      - name: Build for CodeQL
        run: dotnet build --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:csharp

      # --- 3. Trivy filesystem scan (no Docker push needed) ---
      - name: Run Trivy vulnerability scanner on source
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()   # upload even if the scan step failed
        with:
          sarif_file: trivy-results.sarif

  docker-mcp:
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_MCP }}
          tags: |
            # push tag v1.2.3 → genera 1.2.3
            type=semver,pattern={{version}}
            # push su branch → short sha (es. sha-a3f8c2d)
            type=sha,prefix=sha-,format=short
            # latest solo sul branch di default (master)
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.mcpserver
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-api-gateway:
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.apigateway
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
