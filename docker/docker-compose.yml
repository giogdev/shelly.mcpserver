
services:
  shelly-cloud-mcp-server:
    image: giogdev/shelly-cloud-mcp-server:latest
    container_name: shelly-cloud-mcp-server
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - SHELLY_API_ENDPOINT=${SHELLY_API_ENDPOINT}
      - SHELLY_API_KEY=${SHELLY_API_KEY}
      # Optional: mount a custom devices.json to override auto-discovery.
      - DeviceMappingFile=/app/devices.json
      # Optional: how often (seconds) the background service refreshes device state. Default: 30.
      - DeviceRefreshIntervalSeconds=${DEVICE_REFRESH_INTERVAL_SECONDS:-30}
    volumes:
      # Set DEVICES_FILE_PATH to the local path of your devices.json (e.g. /home/user/devices.json).
      # Defaults to /config/devices.json if not set.
      - ${DEVICES_FILE_PATH:-/config/devices.json}:/app/devices.json:ro
    stdin_open: true
    tty: false

  shelly-api-gateway:
    image: giogdev/shelly-api-gateway:latest
    container_name: shelly-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SHELLY_API_ENDPOINT=${SHELLY_API_ENDPOINT}
      - SHELLY_API_KEY=${SHELLY_API_KEY}
      # Optional: mount a custom devices.json to override auto-discovery.
      - DeviceMappingFile=/app/devices.json
      # Optional: how often (seconds) the background service refreshes device state. Default: 30.
      - DeviceRefreshIntervalSeconds=${DEVICE_REFRESH_INTERVAL_SECONDS:-30}
    volumes:
      # Set DEVICES_FILE_PATH to the local path of your devices.json (e.g. /home/user/devices.json).
      # Defaults to /config/devices.json if not set.
      - ${DEVICES_FILE_PATH:-/config/devices.json}:/app/devices.json:ro
